name: Release

# Triggers when you push a version tag, e.g.:  git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

jobs:
  # -----------------------------------------------------------------------
  # macOS (Apple Silicon)
  # -----------------------------------------------------------------------
  build-mac:
    runs-on: macos-14   # Apple Silicon M1
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install cmake qt

      - name: Download nomacs 3.22.1 app bundle (arm64)
        run: |
          curl -fsSL \
            "https://github.com/nomacs/nomacs/releases/download/3.22.1/nomacs-3.22.1-8f3dff6f-macOS-15.7.4-arm64-quazip-qt6.zip" \
            -o /tmp/nomacs.zip
          unzip -q /tmp/nomacs.zip -d /tmp/nomacs-app
          # The outer zip contains nomacs.app.zip — extract the inner zip too
          INNER_ZIP=$(find /tmp/nomacs-app -name "nomacs.app.zip" | head -1)
          if [[ -n "$INNER_ZIP" ]]; then
            unzip -q "$INNER_ZIP" -d /tmp/nomacs-app
          fi

      - name: Locate nomacs.app inside zip
        run: |
          NOMACS_APP=$(find /tmp/nomacs-app -name "nomacs.app" -maxdepth 3 | head -1)
          if [[ -z "$NOMACS_APP" ]]; then
            echo "nomacs.app not found in zip"; ls -R /tmp/nomacs-app; exit 1
          fi
          echo "NOMACS_APP=$NOMACS_APP" >> "$GITHUB_ENV"

      - name: Clone nomacs source at 3.22.1
        run: |
          git clone --depth=1 --branch 3.22.1 \
            https://github.com/nomacs/nomacs.git /tmp/nomacs-src

      - name: Configure CMake
        run: |
          cmake -S . -B build -G "Unix Makefiles" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_SYSROOT="$(xcrun --sdk macosx --show-sdk-path)" \
            -DNOMACS_APP="${NOMACS_APP}" \
            -DNOMACS_INCLUDE_DIRECTORY="${NOMACS_SRC}/ImageLounge/src/DkCore;${NOMACS_SRC}/ImageLounge/src/DkGui;${NOMACS_SRC}/ImageLounge/src"
        env:
          NOMACS_SRC: /tmp/nomacs-src

      - name: Build
        run: cmake --build build -j4

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libnomacs-decklink.dylib
          fail_on_unmatched_files: true

  # -----------------------------------------------------------------------
  # Windows (x64)
  # -----------------------------------------------------------------------
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          arch: win64_msvc2019_64
          cache: true

      - name: Download nomacs 3.22.1 (Windows x64)
        shell: pwsh
        run: |
          $url = "https://github.com/nomacs/nomacs/releases/download/3.22.1/nomacs-portable-win.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\nomacs.zip"
          Expand-Archive -Path "$env:TEMP\nomacs.zip" -DestinationPath "$env:TEMP\nomacs-win"
          $exe = Get-ChildItem "$env:TEMP\nomacs-win" -Recurse -Filter "nomacs.exe" | Select-Object -First 1
          $dir = $exe.DirectoryName
          echo "NOMACS_DIR=$dir" | Out-File -Append $env:GITHUB_ENV

      - name: Generate nomacsCore import library (if .lib not shipped)
        shell: cmd
        run: |
          if not exist "%NOMACS_DIR%\nomacsCore.lib" (
            if not exist "%NOMACS_DIR%\lib\nomacsCore.lib" (
              echo Generating nomacsCore.lib from DLL...
              dumpbin /exports "%NOMACS_DIR%\nomacsCore.dll" > exports.txt
              powershell -File scripts/make_importlib.ps1 exports.txt nomacsCore "%NOMACS_DIR%\nomacsCore.lib"
            )
          )

      - name: Clone nomacs source at 3.22.1
        run: |
          git clone --depth=1 --branch 3.22.1 https://github.com/nomacs/nomacs.git C:\nomacs-src

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -S . -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DNOMACS_DIR="$env:NOMACS_DIR" `
            "-DNOMACS_INCLUDE_DIRECTORY=C:/nomacs-src/ImageLounge/src/DkCore;C:/nomacs-src/ImageLounge/src/DkGui;C:/nomacs-src/ImageLounge/src"

      - name: Build
        run: cmake --build build --config Release -j4

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Release/nomacs-decklink.dll
          fail_on_unmatched_files: true
